<!doctype html>
<html lang="en">
    <head>
        <!--
        This line makes all headless links point towards
        [domain]/unhelpful-calculator/[link], which is required to make files load
        properly from GHP. When changing domain or repo name, remove/update this!
        -->
        <base href="https://k-henr.github.io/unhelpful-calculator/" />

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- fallback icon for no SVG support or no media query support -->
        <link rel="icon" href="favicons/light.ico" />
        <!-- responsive SVG icons -->
        <link
            rel="icon"
            href="favicons/light.svg"
            media="(prefers-color-scheme: light)"
        />
        <link
            rel="icon"
            href="favicons/dark.svg"
            media="(prefers-color-scheme: dark)"
        />
        <link rel="stylesheet" href="index.css" />
        <title>Unhelpful Calculator</title>
    </head>
    <body>
        <h1 id="heading">Welcome to my calculator!</h1>
        <div id="introduction">
            <p>
                Do you dislike maths? Do you wish you had a handy calculator
                that could do all the boring parts for you? Well, now you do!
            </p>
            <p>...except the calculator doesn't like maths either.</p>
            <p>Enjoy!</p>
        </div>
        <div id="intro-end">
            <button id="collapse-intro">
                <img src="icons/arrowUp.svg" />
            </button>
        </div>
        <div id="calculator">
            <div id="calculator-padding"></div>
            <div id="expressions"></div>
            <button id="expression-adder">
                <img src="/icons/plus.svg" />
            </button>
        </div>
        <div id="expression-error-popup" class="hidden"></div>
    </body>

    <!-- A template for expressions -->
    <template id="expression-template">
        <div class="expression">
            <input class="expression-edit-field" type="text" />
            <div class="expression-error-wrapper hidden">
                <img class="expression-error" src="/icons/error.svg" />
            </div>
            <div class="expression-result hidden"></div>
            <img class="remove-expression" src="/icons/cross.svg" />
        </div>
    </template>

    <!-- A template for buttons with options on the error popup -->
    <template id="error-button-template">
        <input type="button" class="expression-error-button" value="TEST" />
    </template>

    <script src="index.js"></script>
</html>
